# Cephra Java database configuration
# HikariCP reads this file directly via HikariConfig.setPropertyFile()
# Edit credentials here — never hardcode them in source files.

dataSourceClassName=com.mysql.cj.jdbc.MysqlDataSource
dataSource.serverName=127.0.0.1
dataSource.port=3306
dataSource.databaseName=cephradb
dataSource.user=root
dataSource.password=ushpons08

# Pool tuning
maximumPoolSize=10
minimumIdle=2
connectionTimeout=30000
idleTimeout=600000
maxLifetime=1800000
poolName=CephraPool

# MySQL performance properties
dataSource.cachePrepStmts=true
dataSource.prepStmtCacheSize=250
dataSource.prepStmtCacheSqlLimit=2048
dataSource.useServerPrepStmts=true
